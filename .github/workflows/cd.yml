name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - release

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Select environment by branch
        run: |
          if [ "${TARGET_BRANCH}" = "main" ]; then
            echo "STACK=prod" >> "$GITHUB_ENV"
            echo "PROJECT_NAME=check_prod" >> "$GITHUB_ENV"
            echo "EXTERNAL_PORT=8010" >> "$GITHUB_ENV"
            echo "BACKEND_EXTERNAL_PORT=8020" >> "$GITHUB_ENV"
            echo "IMAGE_TAG=prod" >> "$GITHUB_ENV"
            echo "DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS_MAIN }}" >> "$GITHUB_ENV"
          else
            echo "STACK=test" >> "$GITHUB_ENV"
            echo "PROJECT_NAME=check_test" >> "$GITHUB_ENV"
            echo "EXTERNAL_PORT=4999" >> "$GITHUB_ENV"
            echo "BACKEND_EXTERNAL_PORT=4998" >> "$GITHUB_ENV"
            echo "IMAGE_TAG=test" >> "$GITHUB_ENV"
            echo "DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS_RELEASE }}" >> "$GITHUB_ENV"
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            if [ "${{ env.TARGET_BRANCH }}" = "main" ]; then
              STACK="prod"
              PROJECT_NAME="check_prod"
              EXTERNAL_PORT="8010"
              BACKEND_EXTERNAL_PORT="8020"
              IMAGE_TAG="prod"
              DJANGO_ALLOWED_HOSTS="${{ secrets.DJANGO_ALLOWED_HOSTS_MAIN }}"
            else
              STACK="test"
              PROJECT_NAME="check_test"
              EXTERNAL_PORT="4999"
              BACKEND_EXTERNAL_PORT="4998"
              IMAGE_TAG="test"
              DJANGO_ALLOWED_HOSTS="${{ secrets.DJANGO_ALLOWED_HOSTS_RELEASE }}"
            fi

            BACKEND_IMAGE="${{ secrets.DOCKERHUB_REPO }}:backend-${IMAGE_TAG}"
            FRONTEND_IMAGE="${{ secrets.DOCKERHUB_REPO }}:frontend-${IMAGE_TAG}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}"
            DJANGO_DEBUG="False"

            cd "${{ secrets.DEPLOY_PATH }}"

            git fetch --all --prune
            git checkout "${{ env.TARGET_BRANCH }}"
            git pull origin "${{ env.TARGET_BRANCH }}"

            cat > .env <<EOF_ENV
            EXTERNAL_PORT=${EXTERNAL_PORT}
            BACKEND_EXTERNAL_PORT=${BACKEND_EXTERNAL_PORT}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
            DJANGO_DEBUG=${DJANGO_DEBUG}
            DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
            EOF_ENV

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            if docker compose version >/dev/null 2>&1; then
              docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" pull
              docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" up -d --force-recreate --remove-orphans
            else
              docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" down --remove-orphans || true
              docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" pull
              docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" up -d --force-recreate --remove-orphans
            fi
