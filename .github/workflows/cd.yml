name: cd

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
    branches:
      - main
      - release

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            TARGET_BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "${TARGET_BRANCH}" = "main" ]; then
              PROJECT_NAME="check_prod"
              EXTERNAL_PORT="8010"
              BACKEND_EXTERNAL_PORT="8020"
              IMAGE_TAG="prod"
              DJANGO_ALLOWED_HOSTS="${{ secrets.DJANGO_ALLOWED_HOSTS_MAIN }}"
              DJANGO_SITE_URL="http://${{ secrets.SSH_HOST }}:8010"
            else
              PROJECT_NAME="check_test"
              EXTERNAL_PORT="4999"
              BACKEND_EXTERNAL_PORT="4998"
              IMAGE_TAG="test"
              DJANGO_ALLOWED_HOSTS="${{ secrets.DJANGO_ALLOWED_HOSTS_RELEASE }}"
              DJANGO_SITE_URL="http://${{ secrets.SSH_HOST }}:4999"
            fi

            BACKEND_IMAGE="${{ secrets.DOCKERHUB_REPO }}:backend-${IMAGE_TAG}"
            FRONTEND_IMAGE="${{ secrets.DOCKERHUB_REPO }}:frontend-${IMAGE_TAG}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}"
            DJANGO_DEBUG="False"
            DJANGO_EMAIL_BACKEND="${{ secrets.DJANGO_EMAIL_BACKEND }}"
            DJANGO_EMAIL_HOST="${{ secrets.DJANGO_EMAIL_HOST }}"
            DJANGO_EMAIL_PORT="${{ secrets.DJANGO_EMAIL_PORT }}"
            DJANGO_EMAIL_HOST_USER="${{ secrets.DJANGO_EMAIL_HOST_USER }}"
            DJANGO_EMAIL_HOST_PASSWORD="${{ secrets.DJANGO_EMAIL_HOST_PASSWORD }}"
            DJANGO_EMAIL_USE_TLS="${{ secrets.DJANGO_EMAIL_USE_TLS }}"
            DJANGO_EMAIL_USE_SSL="${{ secrets.DJANGO_EMAIL_USE_SSL }}"
            DJANGO_DEFAULT_FROM_EMAIL="${{ secrets.DJANGO_DEFAULT_FROM_EMAIL }}"

            [ -n "${POSTGRES_DB}" ] || { echo "POSTGRES_DB is empty"; exit 1; }
            [ -n "${POSTGRES_USER}" ] || { echo "POSTGRES_USER is empty"; exit 1; }
            [ -n "${POSTGRES_PASSWORD}" ] || { echo "POSTGRES_PASSWORD is empty"; exit 1; }
            [ -n "${DJANGO_SECRET_KEY}" ] || { echo "DJANGO_SECRET_KEY is empty"; exit 1; }
            [ -n "${DJANGO_EMAIL_BACKEND}" ] || { echo "DJANGO_EMAIL_BACKEND is empty"; exit 1; }
            [ -n "${DJANGO_EMAIL_HOST}" ] || { echo "DJANGO_EMAIL_HOST is empty"; exit 1; }
            [ -n "${DJANGO_EMAIL_PORT}" ] || { echo "DJANGO_EMAIL_PORT is empty"; exit 1; }
            [ -n "${DJANGO_EMAIL_HOST_USER}" ] || { echo "DJANGO_EMAIL_HOST_USER is empty"; exit 1; }
            [ -n "${DJANGO_EMAIL_HOST_PASSWORD}" ] || { echo "DJANGO_EMAIL_HOST_PASSWORD is empty"; exit 1; }

            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --prune
            git checkout "${TARGET_BRANCH}"
            git pull origin "${TARGET_BRANCH}"

            cat > .env <<EOF_ENV
            EXTERNAL_PORT=${EXTERNAL_PORT}
            BACKEND_EXTERNAL_PORT=${BACKEND_EXTERNAL_PORT}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
            DJANGO_DEBUG=${DJANGO_DEBUG}
            DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
            DJANGO_SITE_URL=${DJANGO_SITE_URL}
            DJANGO_EMAIL_BACKEND=${DJANGO_EMAIL_BACKEND}
            DJANGO_EMAIL_HOST=${DJANGO_EMAIL_HOST}
            DJANGO_EMAIL_PORT=${DJANGO_EMAIL_PORT}
            DJANGO_EMAIL_HOST_USER=${DJANGO_EMAIL_HOST_USER}
            DJANGO_EMAIL_HOST_PASSWORD=${DJANGO_EMAIL_HOST_PASSWORD}
            DJANGO_EMAIL_USE_TLS=${DJANGO_EMAIL_USE_TLS}
            DJANGO_EMAIL_USE_SSL=${DJANGO_EMAIL_USE_SSL}
            DJANGO_DEFAULT_FROM_EMAIL=${DJANGO_DEFAULT_FROM_EMAIL}
            EOF_ENV

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            if docker compose version >/dev/null 2>&1; then
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" pull
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" up -d --force-recreate --remove-orphans
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" exec -T web python manage.py shell -c "from django.conf import settings; db=settings.DATABASES['default']; print(db['ENGINE'], db['NAME'], db['HOST'])"
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" exec -T web python manage.py migrate --noinput
            else
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" down --remove-orphans || true
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" pull
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" up -d --force-recreate --remove-orphans
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" exec -T web python manage.py shell -c "from django.conf import settings; db=settings.DATABASES['default']; print(db['ENGINE'], db['NAME'], db['HOST'])"
              EXTERNAL_PORT="${EXTERNAL_PORT}" BACKEND_EXTERNAL_PORT="${BACKEND_EXTERNAL_PORT}" docker-compose -f docker-compose.prod.yml -p "${PROJECT_NAME}" exec -T web python manage.py migrate --noinput
            fi
