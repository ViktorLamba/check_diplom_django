name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: flake8 backend

      - name: Run Django tests
        run: python backend/manage.py test

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'release')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select image tag by branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=prod" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=test" >> "$GITHUB_ENV"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_REPO }}:backend-${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_REPO }}:frontend-${{ env.IMAGE_TAG }}
